name: 每日财经早报推送

on:
  schedule:
    # 这里的 0 0 * * * 是 UTC 时间，刚好对应北京时间早上 8 点
    - cron: '0 0 * * *'
  workflow_dispatch: # 这个允许你随时手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 获取代码
        uses: actions/checkout@v3

      - name: 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装需要的工具包
        run: |
          pip install requests feedparser

      - name: 运行早报脚本
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py
