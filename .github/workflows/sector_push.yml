name: 军工电网学术定向研报(Gemini 2026版)

# 配置触发条件
on:
  schedule:
    # 每天北京时间早上 07:00 运行 (UTC 时间 23:00)
    - cron: '00 23 * * *'
  # 支持在 GitHub 页面手动点击 "Run workflow" 触发
  workflow_dispatch:

# 赋予 GitHub Action 写入权限（如果后续涉及保存历史账本文件）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装 2026 最新版 Gemini SDK 和依赖
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 注意：这里安装的是全新的 google-genai 库
          pip install google-genai requests

      # 4. 执行采编与推送脚本
      - name: Run Gemini Scraper
        env:
          # 以下变量需在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中配置
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python military_grid.py

      # 5. (可选) 提交生成的历史记录到仓库
      - name: Commit Ledger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_history.txt || echo "No news_history.txt to add"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update history ledger [skip ci]" && git push origin main)
