name: 军工电网行业专属定向研报

on:
  schedule:
    # 错开宏观早报时间，设为 UTC 22:45（即北京时间早上 6:45 触发）
    - cron: '45 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests edge-tts akshare google-generativeai pandas
