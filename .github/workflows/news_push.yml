name: 每日宏观早报抓取与双轨推送

on:
  schedule:
    - cron: '30 22 * * *'  # 保持你现在的时间不变
  workflow_dispatch: 

# 【关键新增1】：赋予机器人写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests edge-tts

      - name: Run News Scraper and Audio Generator
        env:
          COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
          COZE_BOT_ID: ${{ secrets.COZE_BOT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python main.py

      # 【关键新增2】：提交宏观账本
      - name: Commit and Push Macro History Ledger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_news_history.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update macro news ledger [skip ci]" && git push)
