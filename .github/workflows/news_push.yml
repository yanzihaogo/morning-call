name: 每日宏观早报抓取与语音合成

on:
  schedule:
    # 每天 UTC 0:00 运行 (北京时间早上 8:00)
    - cron: '0 0 * * *' 
  workflow_dispatch: # 允许你在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 拉取你的代码库

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 指定 Python 3.10 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 这里新增了 edge-tts，用于后续将文本转为语音
          pip install requests edge-tts

      - name: Run News Scraper and Audio Generator
        env:
          # 从 GitHub Secrets 读取你的环境变量
          COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
          COZE_BOT_ID: ${{ secrets.COZE_BOT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py
