name: 每日新闻抓取与推送

on:
  schedule:
    # 重点：GitHub 服务器用的是 UTC 时间（世界标准时间）。
    # 北京时间比 UTC 快 8 小时。所以北京时间的早上 8:00，就是 UTC 的 0:00。
    # cron 格式: '分 时 日 月 周'
    - cron: '0 0 * * *' 
  workflow_dispatch: # 这个配置允许你在 GitHub 网页上手动点击运行，方便测试

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 系统运行你的代码
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # 拉取你的代码库

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 指定 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests # 安装 requests 库

      - name: Run News Scraper
        env:
          # 从 GitHub Secrets 中读取你的密钥，绝对安全
          COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
          COZE_BOT_ID: ${{ secrets.COZE_BOT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }} # 如果你用 PushPlus 推送的话
        run: python main.py # 假设你的 Python 脚本名字叫 main.py
